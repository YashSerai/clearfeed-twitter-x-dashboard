sources:
  - key: priority_list
    env_var: LIST_1_URL
    weight_env_var: LIST_1_WEIGHT
    label: Priority List
    type: list
    cadence_minutes: 15
    source_weight: 1.0
    preferred_action: reply
    use_for_original_posts: true
  - key: secondary_list
    env_var: LIST_2_URL
    weight_env_var: LIST_2_WEIGHT
    label: Secondary List
    type: list
    cadence_minutes: 20
    source_weight: 0.9
    preferred_action: reply
    use_for_original_posts: true
  - key: research_list
    env_var: LIST_3_URL
    weight_env_var: LIST_3_WEIGHT
    label: Research List
    type: list
    cadence_minutes: 25
    source_weight: 0.85
    preferred_action: quote_reply
    use_for_original_posts: true
  - key: home_timeline
    enabled_env_var: HOME_TIMELINE_ENABLED
    weight_env_var: HOME_TIMELINE_WEIGHT
    label: Home Timeline
    type: home
    cadence_minutes: 10
    source_weight: 0.88
    preferred_action: reply
    use_for_original_posts: false
    max_age_minutes: 240
